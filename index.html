<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN RINCÓN DEL INTERNET</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Open Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        header { text-align: center; margin-bottom: 20px; }
        .main-title { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(108, 92, 231, 0.6); }
        .subtitle-line { width: 60px; height: 4px; background: #6c5ce7; margin: 10px auto; border-radius: 10px; }
        
        .hero-banner { width: 100%; max-width: 500px; aspect-ratio: 16 / 9; background-image: url('https://cdn.discordapp.com/attachments/1128263242909765652/1481442141267034343/Nuevo_proyecto_39_Copy_2_Copy_Copy_B6B7516.png?ex=69b35402&is=69b20282&hm=36df8045bd700ddf03e9109746f12a28b39dd0a79f55dfb96f6c627589b46b7c&'); background-size: cover; background-position: center; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); margin-bottom: 20px; border: 1px solid rgba(108, 92, 231, 0.3); }

        .description-card { background-color: #161b22; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; border-bottom: 3px solid #6c5ce7; margin-bottom: 25px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        #typing-text { font-size: 1.1rem; font-weight: 600; color: #ffffff; line-height: 1.5; }
        #typing-text::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .discord-widget-wrapper { width: 100%; max-width: 350px; height: 65px; overflow: hidden; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }

        /* --- MENÚ DE JUEGOS --- */
        .game-menu { display: grid; grid-template-columns: 1fr; gap: 10px; width: 100%; max-width: 300px; margin-bottom: 40px; }
        .btn { display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-weight: 700; transition: 0.3s; cursor: pointer; border: none; font-size: 0.9rem; }
        .btn-discord { background-color: #5865F2; margin-bottom: 10px; border-radius: 50px; }
        .btn-game { background-color: #161b22; border: 1px solid #6c5ce7; }
        .btn:active { transform: scale(0.95); }

        /* --- MODALES --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #6c5ce7; width: 100%; max-width: 350px; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }

        /* --- TRAGAMONEDAS (CORREGIDO) --- */
        .slot-machine { display: flex; justify-content: center; gap: 10px; margin: 20px 0; font-size: 3.5rem; background: #0d1117; padding: 15px; border-radius: 10px; border: 2px inset #6c5ce7; }
        .slot-result { margin-bottom: 15px; font-weight: bold; height: 20px; }
        
        /* --- MATH GAME --- */
        #math-question { font-size: 2.5rem; margin: 15px 0; font-weight: bold; color: #6c5ce7; }
        .math-input { width: 120px; padding: 12px; font-size: 1.5rem; text-align: center; border-radius: 8px; border: 2px solid #6c5ce7; background: #0d1117; color: white; outline: none; }

        /* --- TIC TAC TOE (IA MEJORADA + REINICIO) --- */
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px auto; max-width: 250px; }
        .cell { aspect-ratio: 1/1; background: #0d1117; border: 1px solid #6c5ce7; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .cell.win { background: #6c5ce7; color: white; transform: scale(1.1); animation: winPulse 0.5s infinite alternate; }
        @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        .setup-row { margin: 10px 0; font-size: 0.9rem; }
        .mini-btn { background: #0d1117; border: 1px solid #6c5ce7; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .mini-btn.active { background: #6c5ce7; }

        footer { margin-top: auto; padding: 10px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">UN RINCÓN DEL INTERNET</h1>
        <div class="subtitle-line"></div>
    </header>

    <div class="hero-banner"></div>

    <article class="description-card">
        <p id="typing-text"></p>
    </article>

    <div class="discord-widget-wrapper">
        <iframe src="https://discord.com/widget?id=1127514447007719565&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
    </div>

    <a href="https://discord.gg/zRSJX6teBj" class="btn btn-discord" target="_blank">¡ENTRAR AL SERVIDOR!</a>

    <div class="game-menu">
        <button class="btn btn-game" onclick="openModal('tttModal')">🎮 3 EN RAYA</button>
        <button class="btn btn-game" onclick="openModal('slotModal')">🎰 TRAGAMONEDAS</button>
        <button class="btn btn-game" onclick="openModal('mathModal')">🧮 MATEMÁTICAS</button>
    </div>

    <div id="tttModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('tttModal')">&times;</span>
            <div id="ttt-setup">
                <h3>3 en Raya</h3>
                <div class="setup-row">
                    Ficha: <button class="mini-btn active" id="btnFichaX" onclick="setFichaTTT('X')">X</button> <button class="mini-btn" id="btnFichaO" onclick="setFichaTTT('O')">O</button>
                </div>
                <div class="setup-row">
                    Nivel: <select id="ttt-diff" style="padding:3px; background:#0d1117; color:white; border:1px solid #6c5ce7;">
                        <option value="easy">Fácil</option>
                        <option value="normal">Normal</option>
                        <option value="hard">Extremo</option>
                    </select>
                </div>
                <button class="btn btn-game" onclick="startTTT()" style="margin-top:10px;">Jugar</button>
            </div>
            <div id="ttt-game" style="display:none;">
                <div id="ttt-status" style="margin-bottom:10px; font-weight:bold;">Tu turno</div>
                <div class="board" id="ttt-board"></div>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                    <button class="mini-btn" id="btnRestartTTT" onclick="restartTTT()" style="display:none;">Volver a Jugar</button>
                    <button class="mini-btn" onclick="backToTTTSetup()" style="border-color:#555; color:#888;">Ajustes</button>
                </div>
            </div>
        </div>
    </div>

    <div id="slotModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('slotModal')">&times;</span>
            <h3>Casino Rincón</h3>
            <div class="slot-machine">
                <span id="s1">❓</span><span id="s2">❓</span><span id="s3">❓</span>
            </div>
            <div class="slot-result" id="slot-result">¡Suerte!</div>
            <button class="btn btn-game" id="spinBtn" onclick="spin()">¡GIRAR!</button>
        </div>
    </div>

    <div id="mathModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('mathModal')">&times;</span>
            <h3>Reto Matemático</h3>
            <div id="math-question">...</div>
            <input type="number" id="math-answer" class="math-input" placeholder="?">
            <div id="math-msg" style="margin:15px 0; font-weight:bold; height:20px;"></div>
            <button class="btn btn-game" onclick="checkMath()">RESPONDER</button>
        </div>
    </div>

    <footer>&copy; 2026 Un Rincón Del Internet</footer>

    <script>
        // --- TYPING ---
        const textToType = "Un humilde rincón de internet dedicado a la socialización y al disfrute, con una moderación adecuada.";
        const typingElement = document.getElementById("typing-text");
        let charIndex = 0;
        function startTyping() { if (charIndex < textToType.length) { typingElement.textContent += textToType.charAt(charIndex); charIndex++; setTimeout(startTyping, 50); } }
        window.addEventListener('DOMContentLoaded', startTyping);

        // --- GESTIÓN DE MODALES ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='mathModal') nextMath(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- TRAGAMONEDAS (SOLUCIÓN EMOJIS) ---
        const iconsSlot = ['🍎','🍐','🍋','🍉','🍇','🍓','🍒','🍍','🥥','🥝','🍕','🍔','🍟','🌭','🥓','🧀','🥨','🥯','🥞','🧇'];
        function spin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('slot-result').textContent = "Girando...";
            let count = 0;
            let timer = setInterval(() => {
                document.getElementById('s1').textContent = iconsSlot[Math.floor(Math.random()*iconsSlot.length)];
                document.getElementById('s2').textContent = iconsSlot[Math.floor(Math.random()*iconsSlot.length)];
                document.getElementById('s3').textContent = iconsSlot[Math.floor(Math.random()*iconsSlot.length)];
                count++;
                if(count > 15) {
                    clearInterval(timer);
                    btn.disabled = false;
                    checkSlotWin();
                }
            }, 80);
        }
        function checkSlotWin() {
            const r1 = document.getElementById('s1').textContent;
            const r2 = document.getElementById('s2').textContent;
            const r3 = document.getElementById('s3').textContent;
            const msg = document.getElementById('slot-result');
            if(r1 === r2 && r2 === r3) {
                msg.textContent = "¡JACKPOT! 🎉";
                msg.style.color = "#FFD700";
            } else {
                msg.textContent = "Sigue intentando...";
                msg.style.color = "white";
            }
        }

        // --- MATEMÁTICAS ---
        let currentAns = 0;
        function nextMath() {
            const a = Math.floor(Math.random() * 50) + 1;
            const b = Math.floor(Math.random() * 50) + 1;
            const op = Math.random() > 0.5 ? '+' : '-';
            currentAns = op === '+' ? a + b : a - b;
            document.getElementById('math-question').textContent = `${a} ${op} ${b}`;
            document.getElementById('math-answer').value = "";
            document.getElementById('math-msg').textContent = "";
        }
        function checkMath() {
            const val = document.getElementById('math-answer').value;
            if(val === "") return;
            if(parseInt(val) === currentAns) {
                document.getElementById('math-msg').textContent = "¡Correcto! ✅";
                document.getElementById('math-msg').style.color = "#4BB543";
                setTimeout(nextMath, 1000);
            } else {
                document.getElementById('math-msg').textContent = "Incorrecto ❌";
                document.getElementById('math-msg').style.color = "#FF3333";
            }
        }

        // --- 3 EN RAYA (IA MEJORADA Y REINICIO) ---
        let tBoard = ["","","","","","","","",""];
        let humanTTT = "X";
        let aiTTT = "O";
        let difficultyTTT = "easy";
        let gameActiveTTT = false;

        function setFichaTTT(ficha) {
            humanTTT = ficha;
            aiTTT = ficha === "X" ? "O" : "X";
            document.getElementById('btnFichaX').className = ficha === 'X' ? 'mini-btn active' : 'mini-btn';
            document.getElementById('btnFichaO').className = ficha === 'O' ? 'mini-btn active' : 'mini-btn';
        }

        function startTTT() {
            difficultyTTT = document.getElementById('ttt-diff').value;
            document.getElementById('ttt-setup').style.display = 'none';
            document.getElementById('ttt-game').style.display = 'block';
            restartTTT();
        }

        function backToTTTSetup() {
            document.getElementById('ttt-setup').style.display = 'block';
            document.getElementById('ttt-game').style.display = 'none';
        }

        function restartTTT() {
            tBoard = ["","","","","","","","",""];
            gameActiveTTT = true;
            document.getElementById('btnRestartTTT').style.display = 'none';
            drawTTTBoard();
            
            if(aiTTT === "X") {
                document.getElementById('ttt-status').textContent = "IA pensando...";
                gameActiveTTT = false;
                setTimeout(aiMoveTTT, 600);
            } else {
                document.getElementById('ttt-status').textContent = "Tu turno ("+humanTTT+")";
            }
        }

        function drawTTTBoard() {
            const container = document.getElementById('ttt-board');
            container.innerHTML = "";
            tBoard.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = val;
                cell.onclick = () => playerMoveTTT(i);
                container.appendChild(cell);
            });
        }

        function playerMoveTTT(index) {
            if(tBoard[index] === "" && gameActiveTTT) {
                tBoard[index] = humanTTT;
                drawTTTBoard();
                if(!checkEndTTT()) {
                    gameActiveTTT = false;
                    document.getElementById('ttt-status').textContent = "IA pensando...";
                    setTimeout(aiMoveTTT, 600);
                }
            }
        }

        function aiMoveTTT() {
            let move;
            if (difficultyTTT === "easy") {
                move = randomMove();
            } else if (difficultyTTT === "normal") {
                // Modo Normal: 50% de probabilidad de jugar perfecto con Minimax
                if (Math.random() < 0.5) {
                    move = minimax(tBoard, aiTTT).index;
                } else {
                    move = randomMove();
                }
            } else {
                // Modo Extremo: Siempre juega perfecto con Minimax
                move = minimax(tBoard, aiTTT).index;
            }

            if (move !== undefined) tBoard[move] = aiTTT;
            drawTTTBoard();
            gameActiveTTT = true;
            if(!checkEndTTT()) {
                document.getElementById('ttt-status').textContent = "Tu turno ("+humanTTT+")";
            }
        }

        function randomMove() {
            let available = tBoard.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        // ALGORITMO MINIMAX PARA IA SUPER INTELIGENTE
        function minimax(newBoard, player) {
            let availSpots = newBoard.map((v, i) => v === "" ? i : null).filter(v => v !== null);

            if (winning(newBoard, humanTTT)) return {score: -10};
            if (winning(newBoard, aiTTT)) return {score: 10};
            if (availSpots.length === 0) return {score: 0};

            let moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                let move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;

                if (player === aiTTT) {
                    let result = minimax(newBoard, humanTTT);
                    move.score = result.score;
                } else {
                    let result = minimax(newBoard, aiTTT);
                    move.score = result.score;
                }

                newBoard[availSpots[i]] = "";
                moves.push(move);
            }

            let bestMove;
            if (player === aiTTT) {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) {
                        bestScore = moves[i].score;
                        bestMove = i;
                    }
                }
            }
            return moves[bestMove];
        }

        function winning(b, player) {
            if (
                (b[0] == player && b[1] == player && b[2] == player) ||
                (b[3] == player && b[4] == player && b[5] == player) ||
                (b[6] == player && b[7] == player && b[8] == player) ||
                (b[0] == player && b[3] == player && b[6] == player) ||
                (b[1] == player && b[4] == player && b[7] == player) ||
                (b[2] == player && b[5] == player && b[8] == player) ||
                (b[0] == player && b[4] == player && b[8] == player) ||
                (b[2] == player && b[4] == player && b[6] == player)
            ) {
                return true;
            } else {
                return false;
            }
        }

        function checkEndTTT() {
            const winConditions = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let condition of winConditions) {
                let [a, b, c] = condition;
                if (tBoard[a] && tBoard[a] === tBoard[b] && tBoard[a] === tBoard[c]) {
                    gameActiveTTT = false;
                    document.getElementById('ttt-status').textContent = `¡Gana ${tBoard[a]}!`;
                    highlightWinTTT(condition);
                    document.getElementById('btnRestartTTT').style.display = 'block';
                    return true;
                }
            }
            if (!tBoard.includes("")) {
                gameActiveTTT = false;
                document.getElementById('ttt-status').textContent = "¡Empate! 🤝";
                document.getElementById('btnRestartTTT').style.display = 'block';
                return true;
            }
            return false;
        }

        function highlightWinTTT(cells) {
            const containerCells = document.getElementById('ttt-board').children;
            for(let index of cells) {
                containerCells[index].classList.add('win');
            }
        }
    </script>
</body>
</html>
