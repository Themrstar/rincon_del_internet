<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN RINCÓN DEL INTERNET</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 20px; }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(108, 92, 231, 0.6);
        }

        .subtitle-line {
            width: 60px;
            height: 4px;
            background: #6c5ce7;
            margin: 10px auto;
            border-radius: 10px;
        }

        .hero-banner {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 16 / 9;
            background-image: url('https://cdn.discordapp.com/attachments/1128263242909765652/1481442141267034343/Nuevo_proyecto_39_Copy_2_Copy_Copy_B6B7516.png?ex=69b35402&is=69b20282&hm=36df8045bd700ddf03e9109746f12a28b39dd0a79f55dfb96f6c627589b46b7c&');
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        /* Caja de descripción arreglada */
        .description-card {
            background-color: #161b22;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border-bottom: 3px solid #6c5ce7;
            margin-bottom: 25px;
        }

        .description-card p {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff; /* Color blanco para que se vea bien */
            line-height: 1.5;
        }

        /* --- WIDGET RECORTADO (SOLO NÚMEROS) --- */
        .discord-widget-wrapper {
            width: 100%;
            max-width: 350px;
            height: 65px; /* Altura muy corta para tapar los usuarios */
            overflow: hidden; 
            border-radius: 10px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .discord-widget-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .discord-button {
            display: inline-flex;
            align-items: center;
            background-color: #5865F2;
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
            margin-bottom: 40px;
        }

        footer {
            margin-top: auto;
            padding: 10px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">UN RINCÓN DEL INTERNET</h1>
        <div class="subtitle-line"></div>
    </header>

    <div class="hero-banner"></div>

    <article class="description-card">
        <p>Un humilde rincón de internet dedicado a la socialización y al disfrute, con una moderación adecuada.</p>
    </article>

    <div class="discord-widget-wrapper">
        <iframe src="https://discord.com/widget?id=1127514447007719565&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
    </div>

    <a href="https://discord.gg/zRSJX6teBj" class="discord-button" target="_blank">
        ¡ENTRAR AL SERVIDOR!
    </a>

    <footer>
        &copy; 2026 Un Rincón Del Internet
    </footer>

    
</body>
</html>
