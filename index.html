<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN RINCÓN DEL INTERNET</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Open Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* --- ESTILOS DE CABECERA Y BANNER --- */
        header { text-align: center; margin-bottom: 20px; }
        .main-title { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; color: #ffffff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(108, 92, 231, 0.6); }
        .subtitle-line { width: 60px; height: 4px; background: #6c5ce7; margin: 10px auto; border-radius: 10px; }
        .hero-banner { width: 100%; max-width: 500px; aspect-ratio: 16 / 9; background-image: url('https://cdn.discordapp.com/attachments/1128263242909765652/1481442141267034343/Nuevo_proyecto_39_Copy_2_Copy_Copy_B6B7516.png?ex=69b35402&is=69b20282&hm=36df8045bd700ddf03e9109746f12a28b39dd0a79f55dfb96f6c627589b46b7c&'); background-size: cover; background-position: center; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); margin-bottom: 20px; border: 1px solid rgba(108, 92, 231, 0.3); }

        /* --- DESCRIPCIÓN --- */
        .description-card { background-color: #161b22; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; border-bottom: 3px solid #6c5ce7; margin-bottom: 25px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        #typing-text { font-size: 1.1rem; font-weight: 600; color: #ffffff; line-height: 1.5; }
        #typing-text::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* --- WIDGET --- */
        .discord-widget-wrapper { width: 100%; max-width: 350px; height: 65px; overflow: hidden; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }

        /* --- BOTONES PRINCIPALES --- */
        .btn-container { display: flex; flex-direction: column; gap: 15px; width: 100%; align-items: center; margin-bottom: 40px; }
        .discord-button, .game-button { display: inline-flex; align-items: center; justify-content: center; color: white; text-decoration: none; padding: 15px 35px; border-radius: 50px; font-family: 'Montserrat', sans-serif; font-weight: 700; width: 100%; max-width: 300px; transition: 0.3s; cursor: pointer; border: none; }
        .discord-button { background-color: #5865F2; box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); }
        .game-button { background-color: #6c5ce7; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); }
        .discord-button:active, .game-button:active { transform: scale(0.95); }

        /* --- MODAL DEL JUEGO --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 1000; padding: 10px; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 20px; text-align: center; border: 2px solid #6c5ce7; width: 100%; max-width: 350px; }
        
        .setup-screen { display: flex; flex-direction: column; gap: 15px; }
        .diff-btn, .choice-btn { background: #0d1117; border: 1px solid #6c5ce7; color: white; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .diff-btn.active, .choice-btn.active { background: #6c5ce7; }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px auto; max-width: 250px; }
        .cell { aspect-ratio: 1/1; background: #0d1117; border: 1px solid #6c5ce7; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; color: white; cursor: pointer; border-radius: 10px; }
        .cell.taken { cursor: default; }

        footer { margin-top: auto; padding: 10px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">UN RINCÓN DEL INTERNET</h1>
        <div class="subtitle-line"></div>
    </header>

    <div class="hero-banner"></div>

    <article class="description-card">
        <p id="typing-text"></p>
    </article>

    <div class="discord-widget-wrapper">
        <iframe src="https://discord.com/widget?id=1127514447007719565&theme=dark" width="350" height="500" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
    </div>

    <div class="btn-container">
        <a href="https://discord.gg/zRSJX6teBj" class="discord-button" target="_blank">¡ENTRAR AL SERVIDOR!</a>
        <button class="game-button" onclick="openGame()">JUGAR 3 EN RAYA</button>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div id="setupScreen" class="setup-screen">
                <h3>Configura el Juego</h3>
                <p>Elige tu Ficha:</p>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button class="choice-btn active" id="btnX" onclick="setPlayer('X')">X</button>
                    <button class="choice-btn" id="btnO" onclick="setPlayer('O')">O</button>
                </div>
                <p>Dificultad:</p>
                <button class="diff-btn active" id="dEasy" onclick="setDifficulty('easy')">Fácil</button>
                <button class="diff-btn" id="dNorm" onclick="setDifficulty('normal')">Normal</button>
                <button class="diff-btn" id="dHard" onclick="setDifficulty('hard')">Extremo (Imposible)</button>
                <button class="game-button" onclick="startGame()" style="margin-top:10px;">COMENZAR</button>
                <p onclick="closeGame()" style="cursor:pointer; font-size: 0.8rem; color: #888;">Cerrar</p>
            </div>

            <div id="gameScreen" style="display: none;">
                <div id="status" style="margin-bottom: 15px; font-weight: bold;">Tu turno</div>
                <div class="board" id="board">
                    <div class="cell" onclick="makeMove(0)"></div>
                    <div class="cell" onclick="makeMove(1)"></div>
                    <div class="cell" onclick="makeMove(2)"></div>
                    <div class="cell" onclick="makeMove(3)"></div>
                    <div class="cell" onclick="makeMove(4)"></div>
                    <div class="cell" onclick="makeMove(5)"></div>
                    <div class="cell" onclick="makeMove(6)"></div>
                    <div class="cell" onclick="makeMove(7)"></div>
                    <div class="cell" onclick="makeMove(8)"></div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button onclick="resetGame()" style="background: none; border: 1px solid #6c5ce7; color: white; padding: 5px 15px; border-radius: 5px;">Reiniciar</button>
                    <button onclick="backToSetup()" style="background: none; border: 1px solid #555; color: #888; padding: 5px 15px; border-radius: 5px;">Ajustes</button>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Un Rincón Del Internet</footer>

    <script>
        // --- TYPING ---
        const textToType = "Un humilde rincón de internet dedicado a la socialización y al disfrute, con una moderación adecuada.";
        const typingElement = document.getElementById("typing-text");
        let charIndex = 0;
        function startTyping() { if (charIndex < textToType.length) { typingElement.textContent += textToType.charAt(charIndex); charIndex++; setTimeout(startTyping, 50); } }
        window.addEventListener('DOMContentLoaded', startTyping);

        // --- LÓGICA JUEGO ---
        let board = ["", "", "", "", "", "", "", "", ""];
        let human = "X";
        let ai = "O";
        let difficulty = "easy";
        let gameActive = false;

        function setPlayer(choice) {
            human = choice;
            ai = choice === "X" ? "O" : "X";
            document.getElementById('btnX').classList.toggle('active', choice === 'X');
            document.getElementById('btnO').classList.toggle('active', choice === 'O');
        }

        function setDifficulty(diff) {
            difficulty = diff;
            ['dEasy', 'dNorm', 'dHard'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(diff === 'easy' ? 'dEasy' : diff === 'normal' ? 'dNorm' : 'dHard').classList.add('active');
        }

        function openGame() { document.getElementById('gameModal').style.display = 'flex'; backToSetup(); }
        function closeGame() { document.getElementById('gameModal').style.display = 'none'; }
        function backToSetup() { document.getElementById('setupScreen').style.display = 'flex'; document.getElementById('gameScreen').style.display = 'none'; }
        
        function startGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            resetUI();
            gameActive = true;
            if (human === "O") { 
                document.getElementById('status').textContent = "IA pensando...";
                setTimeout(aiMove, 600); 
            } else {
                document.getElementById('status').textContent = "Tu turno (" + human + ")";
            }
        }

        function makeMove(index) {
            if (board[index] === "" && gameActive) {
                board[index] = human;
                updateUI();
                if (!checkWinner()) {
                    gameActive = false;
                    document.getElementById('status').textContent = "IA pensando...";
                    setTimeout(aiMove, 600);
                }
            }
        }

        function aiMove() {
            let move;
            if (difficulty === "easy") {
                move = randomMove();
            } else if (difficulty === "normal") {
                move = Math.random() > 0.4 ? minimax(board, ai).index : randomMove();
            } else {
                move = minimax(board, ai).index;
            }
            board[move] = ai;
            updateUI();
            if (!checkWinner()) {
                gameActive = true;
                document.getElementById('status').textContent = "Tu turno (" + human + ")";
            }
        }

        function randomMove() {
            let available = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            return available[Math.floor(Math.random() * available.length)];
        }

        // ALGORITMO MINIMAX (MODO EXTREMO)
        function minimax(newBoard, player) {
            let availSpots = newBoard.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (winning(newBoard, human)) return {score: -10};
            if (winning(newBoard, ai)) return {score: 10};
            if (availSpots.length === 0) return {score: 0};

            let moves = [];
            for (let i = 0; i < availSpots.length; i++) {
                let move = {};
                move.index = availSpots[i];
                newBoard[availSpots[i]] = player;
                if (player === ai) move.score = minimax(newBoard, human).score;
                else move.score = minimax(newBoard, ai).score;
                newBoard[availSpots[i]] = "";
                moves.push(move);
            }

            let bestMove;
            if (player === ai) {
                let bestScore = -10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score > bestScore) { bestScore = moves[i].score; bestMove = i; }
                }
            } else {
                let bestScore = 10000;
                for (let i = 0; i < moves.length; i++) {
                    if (moves[i].score < bestScore) { bestScore = moves[i].score; bestMove = i; }
                }
            }
            return moves[bestMove];
        }

        function winning(b, p) {
            return (b[0] === p && b[1] === p && b[2] === p) || (b[3] === p && b[4] === p && b[5] === p) || (b[6] === p && b[7] === p && b[8] === p) ||
                   (b[0] === p && b[3] === p && b[6] === p) || (b[1] === p && b[4] === p && b[7] === p) || (b[2] === p && b[5] === p && b[8] === p) ||
                   (b[0] === p && b[4] === p && b[8] === p) || (b[2] === p && b[4] === p && b[6] === p);
        }

        function checkWinner() {
            if (winning(board, human)) { document.getElementById('status').textContent = "¡Ganaste!"; gameActive = false; return true; }
            if (winning(board, ai)) { document.getElementById('status').textContent = "IA Ganó"; gameActive = false; return true; }
            if (!board.includes("")) { document.getElementById('status').textContent = "Empate"; gameActive = false; return true; }
            return false;
        }

        function updateUI() { document.querySelectorAll('.cell').forEach((c, i) => { c.textContent = board[i]; if(board[i] !== "") c.classList.add('taken'); }); }
        function resetUI() { document.querySelectorAll('.cell').forEach(c => { c.textContent = ""; c.classList.remove('taken'); }); }
        function resetGame() { startGame(); }
    </script>
</body>
</html>
