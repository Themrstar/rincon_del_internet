<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UN RINCÓN DEL INTERNET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- RESETEO Y ESTILOS BASE (Detalle Profesional) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0d1117; /* Fondo oscuro tipo GitHub */
            color: #c9d1d9;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- HEADER Y TÍTULO (Detalle Decorativo) --- */
        header {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(108, 92, 231, 0.5); /* Resplandor sutil */
        }

        .subtitle-line {
            width: 100px;
            height: 4px;
            background-color: #6c5ce7; /* Color de acento de tu badge */
            margin: 0 auto;
            border-radius: 2px;
        }

        /* --- SECCIÓN HERO (Banner y Descripción) --- */
        .hero-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Banner Optimizado para Móvil (Mantiene proporción y carga de internet) */
        .hero-banner {
            width: 100%;
            max-width: 600px; /* Ancho máximo en tablets/PC */
            height: auto;
            aspect-ratio: 16 / 9; /* Fuerza la proporción del banner */
            background-image: url('https://cdn.discordapp.com/attachments/1128263242909765652/1481442141267034343/Nuevo_proyecto_39_Copy_2_Copy_Copy_B6B7516.png?ex=69b35402&is=69b20282&hm=36df8045bd700ddf03e9109746f12a28b39dd0a79f55dfb96f6c627589b46b7c&');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); /* Sombra profesional */
            border: 2px solid rgba(108, 92, 231, 0.1);
        }

        /* Caja de Descripción (Detalle Decorativo) */
        .description-card {
            background-color: #161b22;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
        }

        .description-card::before { /* Acento decorativo sutil */
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #6c5ce7, transparent);
        }

        .description-card p {
            font-size: 1.1rem;
            color: #e0e0e0;
        }

        /* --- SECCIÓN DE ACCIÓN (Botón) --- */
        .action-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: auto; /* Empuja el botón hacia abajo si hay espacio */
            padding-bottom: 40px;
        }

        /* Botón de Discord Estilizado */
        .discord-button {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #5865F2; /* Color oficial Discord */
            color: #ffffff;
            text-decoration: none;
            padding: 18px 35px;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 6px 15px rgba(88, 101, 242, 0.4);
        }

        /* Efecto profesional al pulsar/hover */
        .discord-button:hover,
        .discord-button:active {
            background-color: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.6);
        }

        /* Icono de Discord (SVG integrado para profesionalismo) */
        .discord-icon {
            width: 26px;
            height: 26px;
            fill: #ffffff;
        }

        /* --- FOOTER (Limpio y Profesional) --- */
        footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            font-size: 0.8rem;
            color: #555;
            background-color: #0d1117;
            border-top: 1px solid #21262d;
        }

        /* --- MEDIA QUERIES PARA MÓVILES --- */
        @media (max-width: 600px) {
            .main-title {
                font-size: 1.8rem;
            }

            .description-card {
                padding: 20px;
            }

            .description-card p {
                font-size: 1rem;
            }

            .discord-button {
                font-size: 1rem;
                padding: 15px 25px;
                width: 90%; /* Casi ancho completo en móvil */
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <h1 class="main-title">UN RINCÓN DEL INTERNET</h1>
            <div class="subtitle-line"></div>
        </header>

        <main class="hero-section">
            <div class="hero-banner" role="img" aria-label="Banner de bienvenida"></div>

            <article class="description-card">
                <p>Un humilde rincón de internet dedicado a la socialización y al disfrute, con una moderación adecuada.</p>
            </article>
        </main>

        <section class="action-section">
            <a href="https://discord.gg/zRSJX6teBj" class="discord-button" target="_blank">

            </a>
        </section>
    </div>

    <footer>
        &copy; 2026 UN RINCÓN DEL INTERNET. Todos los derechos reservados.
    </footer>

</body>
</html>
